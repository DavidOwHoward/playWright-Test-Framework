name: Playwright CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      run_ui:
        description: "Run UI tests"
        required: false
        default: "false"
      run_api:
        description: "Run API tests"
        required: true
        default: "true"

concurrency:
  group: playwright-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Playwright Tests
    runs-on: self-hosted
    timeout-minutes: 60

    env:
      CI: true
      BASE_URL: ${{ secrets.BASE_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      DEFAULT_USERNAME: ${{ secrets.DEFAULT_USERNAME }}
      DEFAULT_PASSWORD: ${{ secrets.DEFAULT_PASSWORD }}
      SQL_SERVER: ${{ secrets.SQL_SERVER }}
      SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
      SQL_USERNAME: ${{ secrets.SQL_USERNAME }}
      SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run API tests
        id: run_api_tests
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_api == 'true'
        run: npx playwright test --grep "@Api"

      - name: Run UI tests
        id: run_ui_tests
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_ui == 'true'
        run: npx playwright test --grep "@Smoke"
      
      - name: Copy report to reports folder
        if: always()
        run: |
          mkdir -p reports
          cp -r reports-ese/html/. reports/
          
      - name: Zip the report
        if: always()
        run: Compress-Archive -Path reports\* -DestinationPath playwright-report.zip
        shell: powershell


      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number}}
          path: |
            reports-ese/html/
          retention-days: 30
      - name: Send email with report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Playwright Report - Run #${{ github.run_number }} | API: ${{ steps.run_api_tests.outcome == 'success' && '✅ PASSED' || steps.run_api_tests.outcome == 'failure' && '❌ FAILED' || '⏭️ SKIPPED' }} | UI: ${{ steps.run_ui_tests.outcome == 'success' && '✅ PASSED' || steps.run_ui_tests.outcome == 'failure' && '❌ FAILED' || '⏭️ SKIPPED' }}"
          to: Dairu81@gmail.com
          from: ${{ secrets.GMAIL_USERNAME }}
          body: |
            Playwright test run #${{ github.run_number }} has completed.

            ── API Tests (@Api) ────────────────────────────
            Result: ${{ steps.run_api_tests.outcome == 'success' && 'PASSED ✅' || steps.run_api_tests.outcome == 'failure' && 'FAILED ❌' || 'SKIPPED ⏭️' }}

            ── UI Tests (@Smoke) ────────────────────────────
            Result: ${{ steps.run_ui_tests.outcome == 'success' && 'PASSED ✅' || steps.run_ui_tests.outcome == 'failure' && 'FAILED ❌' || 'SKIPPED ⏭️' }}

            ────────────────────────────────────────────────
            Branch:      ${{ github.ref_name }}
            Commit:      ${{ github.sha }}
            Triggered by: ${{ github.actor }}

            The full HTML report is attached as a ZIP file.
            Unzip it and open index.html in your browser to view.

            View run on GitHub:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: playwright-report.zip
